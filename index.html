<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Tracker</title>
  <style>
    :root{
      --canvas:#f5f6f8;
      --paper:#ffffff;
      --ink:#1a1a1e;
      --muted:#9aa3b2;
      --line:#eaebee;
      --accent:#2f6df6;
      --nav-h:58px;
      --font-jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",system-ui,-apple-system,sans-serif;
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; height:100%; }
    body{
      background:var(--canvas); color:var(--ink); font-family:var(--font-jp);
      -webkit-font-smoothing:antialiased;
      height:100dvh; display:flex; flex-direction:column; overflow:hidden;
    }

    /* ---- frame area ---- */
    .frames{ flex:1; position:relative; min-height:0; }
    .frames iframe{
      position:absolute; inset:0; width:100%; height:100%;
      border:0; background:var(--canvas);
      opacity:0; pointer-events:none; transition:opacity .18s ease;
    }
    .frames iframe.active{ opacity:1; pointer-events:auto; }

    /* ---- bottom tab bar ---- */
    .nav{
      flex:0 0 auto;
      display:flex; align-items:stretch;
      height:calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding-bottom:env(safe-area-inset-bottom);
      background:rgba(255,255,255,.9);
      backdrop-filter:saturate(1.4) blur(12px);
      -webkit-backdrop-filter:saturate(1.4) blur(12px);
      border-top:1px solid var(--line);
    }
    .nav button{
      flex:1; border:0; background:transparent; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
      color:var(--muted); font-family:inherit; font-size:11px; font-weight:600; letter-spacing:.02em;
      transition:color .15s ease;
    }
    .nav button .ic{ font-size:20px; line-height:1; }
    .nav button.active{ color:var(--accent); }
    .nav button:active{ opacity:.6; }
  </style>
</head>
<body>
  <div class="frames">
    <!-- 同一オリジン (reservoirdogs1023-spec.github.io) の既存アプリをそのまま表示 -->
    <iframe id="f-health" title="ヘルストラッカー" loading="lazy"
            src="https://reservoirdogs1023-spec.github.io/health-tracker/"></iframe>
    <iframe id="f-task" title="タスクトラッカー" loading="lazy"
            src="https://reservoirdogs1023-spec.github.io/task-tracker/"></iframe>
  </div>

  <nav class="nav">
    <button id="t-health" data-tab="health"><span class="ic">📊</span>ヘルス</button>
    <button id="t-task"   data-tab="task"><span class="ic">✓</span>タスク</button>
  </nav>

  <script>
    const frames = { health: document.getElementById('f-health'), task: document.getElementById('f-task') };
    const tabs   = { health: document.getElementById('t-health'), task: document.getElementById('t-task') };

    function show(tab){
      for (const k in frames){
        frames[k].classList.toggle('active', k === tab);
        tabs[k].classList.toggle('active', k === tab);
      }
      try { localStorage.setItem('tracker-hub-tab', tab); } catch (e) {}
    }

    for (const k in tabs) tabs[k].addEventListener('click', () => show(k));

    // 前回開いていたタブを復元（既定はタスク）
    let initial = 'task';
    try { const s = localStorage.getItem('tracker-hub-tab'); if (s === 'health' || s === 'task') initial = s; } catch (e) {}
    show(initial);
  </script>
</body>
</html>
